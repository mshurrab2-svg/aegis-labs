<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aegis Labs</title>

<style>
body{
  margin:0;
  background:#05070b;
  color:#e6edf6;
  font-family:Arial, sans-serif;
}

.wrap{
  max-width:700px;
  margin:0 auto;
  padding:90px 22px;
}

.brand{
  color:#7dd3fc;
  font-size:14px;
  letter-spacing:2px;
  margin-bottom:18px;
}

h1{
  font-size:48px;
  margin:0 0 42px;
  font-weight:600;
  letter-spacing:-1px;
  line-height:1.15;
}

.metrics{
  font-size:22px;
  line-height:2.15;
  color:#aab4c3;
}

.highlight{
  color:#7dd3fc;
}

.statement{
  margin-top:54px;
  font-size:26px;
  line-height:1.65;
}

.footer{
  margin-top:76px;
  font-size:15px;
  color:#7b8493;
}

@media (max-width:520px){
  .wrap{
    padding:76px 22px;
  }

  h1{
    font-size:46px;
  }

  .metrics{
    font-size:21px;
  }

  .statement{
    font-size:25px;
  }
}
</style>
</head>

<body>
  <main class="wrap">

    <div class="brand">AEGIS LABS</div>

    <h1>Aegis Signal Engine</h1>

    <div class="metrics">
      40 evaluations<br>
      0 false signals<br>
      1.0 precision / recall
    </div>

    <div class="statement">
      <span class="highlight">Material change detected.</span><br>
      Noise eliminated.
    </div>

    <div class="footer">
      contact: mshurrab20@gmail.com
    </div>

  </main>
</body>
</html>
